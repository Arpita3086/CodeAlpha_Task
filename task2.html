<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Professional Calculator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#0f172a,#1e293b,#2563eb,#7c3aed);
background-size:400% 400%;
animation:bgMove 10s ease infinite;
}



.calculator{
width:420px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);
padding:25px;
border-radius:30px;
border:1px solid rgba(255,255,255,.2);
box-shadow:0 0 20px rgba(56,189,248,.4),
0 0 40px rgba(56,189,248,.2),
0 20px 50px rgba(0,0,0,.5);
position:relative;
}

.title{
text-align:center;
color:white;
font-size:24px;
margin-bottom:10px;
}

#clock{
text-align:center;
color:white;
margin-bottom:10px;
font-size:14px;
}

#display{
width:100%;
height:80px;
border:none;
outline:none;
border-radius:15px;
padding:15px;
font-size:30px;
text-align:right;
background:rgba(255,255,255,.12);
color:white;
margin-bottom:10px;
}

#history{
height:70px;
overflow-y:auto;
padding:8px;
color:#ddd;
font-size:13px;
margin-bottom:15px;
background:rgba(255,255,255,.05);
border-radius:10px;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

button{
height:60px;
border:none;
border-radius:15px;
font-size:20px;
cursor:pointer;
color:white;
background:rgba(255,255,255,.08);
transition:.3s;
}

button:hover{
transform:translateY(-3px);
background:rgba(255,255,255,.18);
}

button:active{
transform:scale(.9);
}

.operator{
background:linear-gradient(45deg,#38bdf8,#0ea5e9);
}

.clear{
background:linear-gradient(45deg,#ef4444,#dc2626);
}

.equal{
background:linear-gradient(45deg,#22c55e,#16a34a);
grid-column:span 2;
}

#themeBtn{
position:absolute;
top:20px;
right:20px;
width:45px;
height:45px;
border-radius:50%;
}

.light{
background:linear-gradient(135deg,#e0e7ff,#f8fafc);
}

.light .calculator{
background:white;
}

.light #display,
.light .title,
.light #clock,
.light #history{
color:black;
}

@media(max-width:450px){
.calculator{width:95%;}
button{height:55px;}
}
</style>
</head>

<body>

<div class="calculator">

<button id="themeBtn">🌙</button>

<div class="title">🧮 Advanced Calculator</div>

<div id="clock"></div>

<input type="text" id="display" readonly>

<div id="history"></div>

<div class="buttons">

<button onclick="appendValue('Math.sqrt(')">√</button>
<button onclick="appendValue('Math.sin(')">sin</button>
<button onclick="appendValue('Math.cos(')">cos</button>
<button onclick="appendValue('Math.tan(')">tan</button>

<button class="clear" onclick="clearDisplay()">C</button>
<button onclick="backspace()">⌫</button>
<button onclick="appendValue('%')">%</button>
<button class="operator" onclick="appendValue('/')">÷</button>

<button onclick="appendValue('7')">7</button>
<button onclick="appendValue('8')">8</button>
<button onclick="appendValue('9')">9</button>
<button class="operator" onclick="appendValue('*')">×</button>

<button onclick="appendValue('4')">4</button>
<button onclick="appendValue('5')">5</button>
<button onclick="appendValue('6')">6</button>
<button class="operator" onclick="appendValue('-')">−</button>

<button onclick="appendValue('1')">1</button>
<button onclick="appendValue('2')">2</button>
<button onclick="appendValue('3')">3</button>
<button class="operator" onclick="appendValue('+')">+</button>

<button onclick="appendValue('0')">0</button>
<button onclick="appendValue('.')">.</button>

<button onclick="appendValue('**2')">x²</button>

<button onclick="appendValue('Math.log10(')">log</button>

<button class="equal" onclick="calculate()">=</button>

<button onclick="copyResult()">📋</button>

</div>

</div>

<script>
const display=document.getElementById("display");

function appendValue(value){
display.value+=value;
}

function clearDisplay(){
display.value="";
}

function backspace(){
display.value=display.value.slice(0,-1);
}

function calculate(){
try{
let expression=display.value;
let result=eval(expression);

document.getElementById("history").innerHTML+=
expression+" = "+result+"<br>";

display.value=result;
}
catch{
display.value="Error";
}
}

function copyResult(){
navigator.clipboard.writeText(display.value);
alert("Result Copied!");
}

document.addEventListener("keydown",function(event){

const key=event.key;

if("0123456789+-*/.%".includes(key)){
display.value+=key;
}
else if(key==="Enter"){
calculate();
}
else if(key==="Backspace"){
backspace();
}
else if(key==="Escape"){
clearDisplay();
}
});

setInterval(()=>{
document.getElementById("clock").innerHTML=
new Date().toLocaleString();
},1000);

document.getElementById("themeBtn").onclick=function(){
document.body.classList.toggle("light");
};
</script>

</body>
</html>
